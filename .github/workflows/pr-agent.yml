name: PR Agent

on:
    pull_request:
        types: [opened, reopened, synchronize]
        branches:
            - main
            - master

jobs:
    pr_agent_job:
        if: ${{ github.event.sender.type != 'Bot' }}
        runs-on: ubuntu-latest
        permissions:
            issues: write
            pull-requests: write
            contents: read
        name: Run PR Agent on pull requests targeting main or master
        steps:
            - name: PR Agent action step
              id: pragent
              uses: the-pr-agent/pr-agent@v0.35.0
              # Set to true to prevent PR-Agent failures (e.g. provider outages or model
              # deprecations) from blocking the merge when branch protection requires this
              # check to pass.
              continue-on-error: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GROQ.KEY: ${{ secrets.GROQ_KEY }}
                  # View the models available here: https://console.groq.com/docs/rate-limits
                  config.model: 'openai/gpt-oss-120b'
                  config.fallback_models: '["qwen/qwen3-32b", "llama-3.3-70b-versatile"]'
                  github_action_config.auto_describe: 'true'
                  github_action_config.auto_review: 'true'
                  github_action_config.auto_improve: 'true'
                  github_action_config.pr_actions: '["opened", "reopened", "synchronize"]'